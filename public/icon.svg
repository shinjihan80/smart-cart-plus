<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 앱 아이콘 배경 (iOS maskable safe zone 고려) -->
  <rect width="512" height="512" rx="128" fill="#F9FAFB"/>

  <!-- 네모 안에 네모 -->
  <!-- 외곽 네모 — 아웃라인 (stroke) -->
  <rect x="96" y="96" width="320" height="320" rx="80"
        fill="none" stroke="#4F46E5" stroke-width="28"/>
  <!-- 내부 네모 — 솔리드 -->
  <rect x="192" y="192" width="128" height="128" rx="28" fill="#4F46E5"/>
</svg>
