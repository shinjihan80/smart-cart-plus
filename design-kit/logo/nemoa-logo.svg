<!-- NEMOA 로고 — 큰 네모 안에 색 다른 두 네모 겹침 -->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 48 48">
  <!-- 외곽 프레임 -->
  <rect x="3" y="3" width="42" height="42" rx="10"
        fill="none" stroke="#4F46E5" stroke-width="2.5"/>
  <!-- 내부 A — indigo -->
  <rect x="11" y="11" width="18" height="18" rx="4" fill="#4F46E5"/>
  <!-- 내부 B — pink -->
  <rect x="19" y="19" width="18" height="18" rx="4"
        fill="#EC4899" fill-opacity="0.92"/>
</svg>
